<!doctype html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>MiculProducator - Premium Local Listings</title>
    <meta
      name="description"
      content="Locallio / MiculProducator - Conectăm producătorii locali din România direct cu masa ta. Descoperă hrană curată de la oameni gospodari."
    />
    <!-- <script src="https://cdn.tailwindcss.com"></script> -->
    <link
      rel="preconnect"
      href="https://startupproducator.onrender.com"
      crossorigin
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: "Inter", sans-serif;
        background-color: #f9f8f6; /* Soft Stone / Cream Tint */
      }
      #app-error {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: #fff;
        z-index: 9999;
        padding: 2rem;
        color: #ef4444;
        font-family: monospace;
      }
      .initial-loader {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        color: #44403c;
        font-weight: 600;
        flex-direction: column;
        gap: 1rem;
      }
    </style>
    <script>
      window.process = window.process || { env: {} };
      window.process.env = {
        SUPABASE_URL: "https://your-project-url.supabase.co",
        SUPABASE_ANON_KEY: "your-anon-key-here",
      };
    </script>
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18.2.0",
          "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
          "react-dom": "https://esm.sh/react-dom@18.2.0",
          "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2",
          "react-dom/": "https://esm.sh/react-dom@18.2.0/",
          "react/": "https://esm.sh/react@18.2.0/"
        }
      }
    </script>
  </head>
  <body class="text-stone-900">
    <div id="root">
      <div class="initial-loader">
        <svg
          class="animate-spin h-8 w-8 text-stone-900"
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
        >
          <circle
            class="opacity-25"
            cx="12"
            cy="12"
            r="10"
            stroke="currentColor"
            stroke-width="4"
          ></circle>
          <path
            class="opacity-75"
            fill="currentColor"
            d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
          ></path>
        </svg>
        <span>Se încarcă piața...</span>
      </div>
    </div>
    <div id="app-error"></div>
    <script>
      window.addEventListener("error", function (event) {
        if (event.message && event.message.includes("ResizeObserver")) return;
        const errorDiv = document.getElementById("app-error");
        if (errorDiv) {
          errorDiv.style.display = "block";
          errorDiv.innerHTML =
            "<h1>Application Error</h1><pre>" +
            (event.message || "Unknown error") +
            "</pre>";
        }
      });
    </script>

    <script type="module" src="./index.tsx"></script>
  </body>
</html>
